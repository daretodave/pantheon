name: march-diag

# TEMPORARY diagnostic clone of march.yml. Dispatch-only, no
# schedule, no watchdog, no ceiling gate. Identical prompt + env
# to production march so the transcript reflects the REAL bug.
# Difference: show_full_output: true (full agent transcript in the
# log) and a 30-min step cap (the post-turn hang sits as dead air
# after the result; we only need the transcript up to the result,
# which lands in the first few minutes). DELETE this file once the
# post-result exit hang is diagnosed. Public-repo note: GitHub
# auto-masks registered secrets in the log; do not leave this
# enabled on a recurring trigger.

on:
  workflow_dispatch:

concurrency:
  group: march-diag
  cancel-in-progress: false

jobs:
  march-diag:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout (full history for /march dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: hashFiles('apps/e2e/package.json') != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only)
        if: hashFiles('apps/e2e/package.json') != ''
        run: pnpm e2e:install

      - name: Install Supabase CLI
        if: hashFiles('supabase/config.toml') != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Pre-start Supabase containers
        if: hashFiles('supabase/config.toml') != ''
        run: supabase start
        timeout-minutes: 5

      - name: Run /march (cloud mode — DIAGNOSTIC, full output)
        id: claude_run
        timeout-minutes: 30
        uses: anthropics/claude-code-action@86eb26bf0139bdd75acd15ea5f00f45ee0a284c2 # v1.0.122
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The single diagnostic difference from production march.
          show_full_output: true
          claude_args: |
            --model claude-opus-4-7
            --dangerously-skip-permissions
          prompt: |
            You are running tiered.tv's autonomous loop in CI (GitHub Actions).
            Read agents.md first for the standing rules — they all apply.

            Cloud-mode adjustments on top of agents.md:

            1. Skip /oversight entirely. It is interactive and never runs in cloud.
            2. Skip /critique. The reader sub-agent depends on a Chrome MCP that is not available on the runner. /critique stays a local-only ritual.
            3. /expand may run; candidates land in plan/PHASE_CANDIDATES.md. Promotion happens only via local /oversight — do not promote candidates from cloud.
            4. The verify gate (`pnpm verify`) and deploy gate (`pnpm deploy:check`) are non-negotiable. Same as local. NEVER --no-verify.
            5. Commit author is the human user via GIT_AUTHOR_* / GIT_COMMITTER_* env vars (already configured by the workflow). Do not run `git config user.*` to change it — the env vars take precedence anyway.
            6. EVERY commit you ship in this tick MUST end with this exact trailer (a blank line before it, then the trailer as its own line):

                  Cloud-Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

               This is how the next tick's ceiling check distinguishes cloud-shipped commits from the user's local work — both have the same author. If a commit lacks this trailer it does not count toward the cloud ceiling, which would let the loop run away. Treat the trailer as non-negotiable, like the verify gate. agents.md's "no Co-Authored-By trailers, plain commit message bodies" rule has an explicit carve-out for this single trailer; nothing else.
            7. If the tick cannot ship cleanly (red verify, red deploy, blocked phase, no work to do, anything else), do NOT half-commit. Either:
               - exit cleanly with a one-line note in the action log explaining why no work shipped this tick, or
               - if there is a real failure to surface, open a GitHub issue with `gh issue create --title "Cloud march failed: <iso-date>" --body "<context + run URL>"` and exit. Do not pass `--label` — the issue lands unlabeled and the next scheduled tick's /triage classifies and labels it appropriately.

            8. MANDATORY FINAL ACTION — runs no matter the outcome (shipped / no-op / failure+issue). The cloud `claude` process has an exit-hang bug: after your last turn it sometimes does not terminate and wedges the whole run. To bound it, the LAST two shell commands of this tick — after verify+commit+push+deploy:check, OR after deciding no-op, OR after opening the failure issue — MUST be, in this exact order:
                 (a) tear down anything the verify/e2e chain left alive, so the process tree can drain and the CLI can exit normally:
                     supabase stop --no-backup 2>/dev/null || true; pkill -f 'next start' 2>/dev/null || true; pkill -f 'next-server' 2>/dev/null || true; pkill -f 'playwright' 2>/dev/null || true
                 (b) push the done-marker the watchdog waits on (a cheap custom ref — does NOT touch main, branches, or tags):
                     git push origin HEAD:refs/cloud-ticks/${{ github.run_id }}-done
               Run nothing after (b). If (a) or (b) error, ignore the error and still end the tick. This is non-negotiable, like the verify gate and the Cloud-Run trailer.

            The dispatch order is the standard /march order from skills/march.md: triage → critique (skipped) → ship-a-phase → ship-data → ship-content → expand → iterate.

            Begin. One tick. One commit-and-push (or no-op). Then the mandatory final action (item 8). Then exit.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: ${{ vars.VERCEL_PROJECT }}
          VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
          AUTH0_BASE_URL: ${{ secrets.AUTH0_BASE_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DISABLE_ANALYTICS: '1'
          GIT_AUTHOR_NAME:     'David Rehmat'
          GIT_AUTHOR_EMAIL:    'me@dave.blue'
          GIT_COMMITTER_NAME:  'David Rehmat'
          GIT_COMMITTER_EMAIL: 'me@dave.blue'

      - name: Drain stray servers
        if: always()
        run: |
          pkill -f 'next start'  || true
          pkill -f 'next-server' || true
          pkill -f 'playwright'  || true
          supabase stop --no-backup || true
          docker ps -q | xargs -r docker kill || true
          echo "drain complete"
