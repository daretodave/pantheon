<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="facade-title">
  <title id="facade-title">Pantheon facade for Top Chef — knife-rack columns, crossed-knives chef-hat pediment, tiled-mosaic frieze, central apothecary vessel.</title>
  <rect width="1200" height="800" fill="#1B2418"/>

  <!-- PEDIMENT (0..200): gable + crossed knives + chef-hat ellipses -->
  <g transform="translate(0 0)">
    <g stroke="#ECDFC6" stroke-width="7" fill="none" stroke-linejoin="round">
      <path d="M 30 184 L 600 22 L 1170 184 Z"/>
      <line x1="20" y1="184" x2="1180" y2="184"/>
      <line x1="14" y1="172" x2="1186" y2="172"/>
    </g>
    <g stroke-linecap="round">
      <!-- crossed knives forming the X -->
      <line x1="780" y1="170" x2="420" y2="60" stroke="#B86A2E" stroke-width="14"/>
      <line x1="420" y1="170" x2="780" y2="60" stroke="#B86A2E" stroke-width="14"/>
      <!-- knife blade highlights -->
      <line x1="780" y1="170" x2="420" y2="60" stroke="#ECDFC6" stroke-width="3" opacity="0.45"/>
      <line x1="420" y1="170" x2="780" y2="60" stroke="#ECDFC6" stroke-width="3" opacity="0.45"/>
      <!-- chef-hat ellipses at upper knife ends -->
      <ellipse cx="400" cy="56" rx="40" ry="22" transform="rotate(-30 400 56)" fill="#B86A2E" stroke="#ECDFC6" stroke-width="3.5"/>
      <ellipse cx="800" cy="56" rx="40" ry="22" transform="rotate(30 800 56)" fill="#B86A2E" stroke="#ECDFC6" stroke-width="3.5"/>
      <!-- inner hat pleat lines -->
      <g stroke="#ECDFC6" stroke-width="1.5" fill="none" opacity="0.6">
        <path d="M 374 48 Q 386 38 398 42" transform="rotate(-30 400 56)"/>
        <path d="M 402 38 Q 414 30 426 38" transform="rotate(-30 400 56)"/>
        <path d="M 774 38 Q 786 30 798 38" transform="rotate(30 800 56)"/>
        <path d="M 802 42 Q 814 38 826 48" transform="rotate(30 800 56)"/>
      </g>
    </g>
  </g>

  <!-- FRIEZE (200..300): tiled-mosaic diamond pattern -->
  <g transform="translate(0 200)">
    <g stroke="#ECDFC6" stroke-width="3" fill="none">
      <line x1="0" y1="6" x2="1200" y2="6"/>
      <line x1="0" y1="94" x2="1200" y2="94"/>
    </g>
    <!-- diamond tile row: 24 tiles, 50px wide, centered at y=50 -->
    <g stroke="#ECDFC6" stroke-width="2" fill="none" stroke-linejoin="round">
      <g>
        <!-- top diamond row -->
        <path d="M 0 50 L 25 25 L 50 50 L 25 75 Z"/>
        <path d="M 50 50 L 75 25 L 100 50 L 75 75 Z"/>
        <path d="M 100 50 L 125 25 L 150 50 L 125 75 Z"/>
        <path d="M 150 50 L 175 25 L 200 50 L 175 75 Z"/>
        <path d="M 200 50 L 225 25 L 250 50 L 225 75 Z"/>
        <path d="M 250 50 L 275 25 L 300 50 L 275 75 Z"/>
        <path d="M 300 50 L 325 25 L 350 50 L 325 75 Z"/>
        <path d="M 350 50 L 375 25 L 400 50 L 375 75 Z"/>
        <path d="M 400 50 L 425 25 L 450 50 L 425 75 Z"/>
        <path d="M 450 50 L 475 25 L 500 50 L 475 75 Z"/>
        <path d="M 500 50 L 525 25 L 550 50 L 525 75 Z"/>
        <path d="M 550 50 L 575 25 L 600 50 L 575 75 Z"/>
        <path d="M 600 50 L 625 25 L 650 50 L 625 75 Z"/>
        <path d="M 650 50 L 675 25 L 700 50 L 675 75 Z"/>
        <path d="M 700 50 L 725 25 L 750 50 L 725 75 Z"/>
        <path d="M 750 50 L 775 25 L 800 50 L 775 75 Z"/>
        <path d="M 800 50 L 825 25 L 850 50 L 825 75 Z"/>
        <path d="M 850 50 L 875 25 L 900 50 L 875 75 Z"/>
        <path d="M 900 50 L 925 25 L 950 50 L 925 75 Z"/>
        <path d="M 950 50 L 975 25 L 1000 50 L 975 75 Z"/>
        <path d="M 1000 50 L 1025 25 L 1050 50 L 1025 75 Z"/>
        <path d="M 1050 50 L 1075 25 L 1100 50 L 1075 75 Z"/>
        <path d="M 1100 50 L 1125 25 L 1150 50 L 1125 75 Z"/>
        <path d="M 1150 50 L 1175 25 L 1200 50 L 1175 75 Z"/>
      </g>
    </g>
    <!-- accent fills on every third diamond -->
    <g fill="#B86A2E" opacity="0.85">
      <path d="M 50 50 L 75 25 L 100 50 L 75 75 Z"/>
      <path d="M 200 50 L 225 25 L 250 50 L 225 75 Z"/>
      <path d="M 350 50 L 375 25 L 400 50 L 375 75 Z"/>
      <path d="M 500 50 L 525 25 L 550 50 L 525 75 Z"/>
      <path d="M 650 50 L 675 25 L 700 50 L 675 75 Z"/>
      <path d="M 800 50 L 825 25 L 850 50 L 825 75 Z"/>
      <path d="M 950 50 L 975 25 L 1000 50 L 975 75 Z"/>
      <path d="M 1100 50 L 1125 25 L 1150 50 L 1125 75 Z"/>
    </g>
  </g>

  <!-- COLUMNS (300..800): four knife-rack columns + center apothecary vessel -->
  <!-- Column 1 — knife rack (paring + chef knife) -->
  <g transform="translate(60 300)">
    <!-- rack rail caps -->
    <g stroke="#ECDFC6" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="20" y="468" width="120" height="22"/>
      <rect x="30" y="14" width="100" height="14"/>
    </g>
    <!-- vertical rail -->
    <line x1="80" y1="28" x2="80" y2="468" stroke="#ECDFC6" stroke-width="2" opacity="0.5"/>
    <!-- knife A: blade down -->
    <g stroke-linecap="round">
      <line x1="55" y1="40" x2="55" y2="430" stroke="#B86A2E" stroke-width="10"/>
      <line x1="55" y1="40" x2="55" y2="430" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="48" y="30" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
    <!-- knife B: blade up -->
    <g stroke-linecap="round">
      <line x1="105" y1="50" x2="105" y2="440" stroke="#B86A2E" stroke-width="10"/>
      <line x1="105" y1="50" x2="105" y2="440" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="98" y="438" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
  </g>

  <!-- Column 2 — knife rack alternate -->
  <g transform="translate(260 300)">
    <g stroke="#ECDFC6" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="20" y="468" width="120" height="22"/>
      <rect x="30" y="14" width="100" height="14"/>
    </g>
    <line x1="80" y1="28" x2="80" y2="468" stroke="#ECDFC6" stroke-width="2" opacity="0.5"/>
    <!-- knife A: blade up -->
    <g stroke-linecap="round">
      <line x1="55" y1="50" x2="55" y2="440" stroke="#B86A2E" stroke-width="10"/>
      <line x1="55" y1="50" x2="55" y2="440" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="48" y="438" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
    <!-- knife B: blade down -->
    <g stroke-linecap="round">
      <line x1="105" y1="40" x2="105" y2="430" stroke="#B86A2E" stroke-width="10"/>
      <line x1="105" y1="40" x2="105" y2="430" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="98" y="30" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
  </g>

  <!-- Column 3 — CENTER: tall apothecary vessel with cross-bars -->
  <g transform="translate(460 300)">
    <!-- pedestal -->
    <g stroke="#ECDFC6" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="40" y="468" width="200" height="22"/>
      <rect x="60" y="450" width="160" height="18"/>
    </g>
    <!-- vessel body: tall apothecary jar -->
    <g stroke="#ECDFC6" stroke-width="4" fill="none">
      <!-- shoulders + body + base, mirrored vertically -->
      <path d="M 100 24
               Q 100 14 110 14
               L 170 14
               Q 180 14 180 24
               L 180 52
               Q 200 64 200 92
               L 200 412
               Q 200 442 170 450
               L 110 450
               Q 80 442 80 412
               L 80 92
               Q 80 64 100 52 Z"/>
      <!-- two cross-bars from the sigil, repeated as bands -->
      <line x1="84" y1="120" x2="196" y2="120"/>
      <line x1="92" y1="180" x2="188" y2="180" opacity="0.55"/>
      <line x1="80" y1="240" x2="200" y2="240"/>
      <line x1="92" y1="300" x2="188" y2="300" opacity="0.55"/>
      <line x1="84" y1="360" x2="196" y2="360"/>
    </g>
    <!-- accent fill at midband -->
    <g fill="#B86A2E" opacity="0.85">
      <rect x="86" y="232" width="108" height="16"/>
    </g>
    <!-- stopper top -->
    <g stroke="#ECDFC6" stroke-width="3" fill="#B86A2E" stroke-linejoin="round">
      <rect x="116" y="0" width="48" height="18" rx="2"/>
    </g>
  </g>

  <!-- Column 4 — knife rack -->
  <g transform="translate(760 300)">
    <g stroke="#ECDFC6" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="20" y="468" width="120" height="22"/>
      <rect x="30" y="14" width="100" height="14"/>
    </g>
    <line x1="80" y1="28" x2="80" y2="468" stroke="#ECDFC6" stroke-width="2" opacity="0.5"/>
    <g stroke-linecap="round">
      <line x1="55" y1="40" x2="55" y2="430" stroke="#B86A2E" stroke-width="10"/>
      <line x1="55" y1="40" x2="55" y2="430" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="48" y="30" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
    <g stroke-linecap="round">
      <line x1="105" y1="50" x2="105" y2="440" stroke="#B86A2E" stroke-width="10"/>
      <line x1="105" y1="50" x2="105" y2="440" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="98" y="438" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
  </g>

  <!-- Column 5 — knife rack alternate -->
  <g transform="translate(960 300)">
    <g stroke="#ECDFC6" stroke-width="3" fill="none" stroke-linejoin="round">
      <rect x="20" y="468" width="120" height="22"/>
      <rect x="30" y="14" width="100" height="14"/>
    </g>
    <line x1="80" y1="28" x2="80" y2="468" stroke="#ECDFC6" stroke-width="2" opacity="0.5"/>
    <g stroke-linecap="round">
      <line x1="55" y1="50" x2="55" y2="440" stroke="#B86A2E" stroke-width="10"/>
      <line x1="55" y1="50" x2="55" y2="440" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="48" y="438" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
    <g stroke-linecap="round">
      <line x1="105" y1="40" x2="105" y2="430" stroke="#B86A2E" stroke-width="10"/>
      <line x1="105" y1="40" x2="105" y2="430" stroke="#ECDFC6" stroke-width="2" opacity="0.45"/>
      <rect x="98" y="30" width="14" height="22" fill="#ECDFC6" rx="2"/>
    </g>
  </g>

  <!-- ORNAMENT BASE STRATA (consistent with siblings) -->
  <g stroke="#ECDFC6" stroke-width="3" fill="none">
    <line x1="0" y1="780" x2="1200" y2="780"/>
    <line x1="0" y1="790" x2="1200" y2="790"/>
  </g>
  <!-- scattered peppercorn dots between columns at base -->
  <g fill="#B86A2E">
    <circle cx="220" cy="785" r="3"/>
    <circle cx="232" cy="785" r="3"/>
    <circle cx="226" cy="775" r="3"/>
    <circle cx="420" cy="785" r="3"/>
    <circle cx="432" cy="785" r="3"/>
    <circle cx="426" cy="775" r="3"/>
    <circle cx="770" cy="785" r="3"/>
    <circle cx="782" cy="785" r="3"/>
    <circle cx="776" cy="775" r="3"/>
    <circle cx="970" cy="785" r="3"/>
    <circle cx="982" cy="785" r="3"/>
    <circle cx="976" cy="775" r="3"/>
  </g>
</svg>
