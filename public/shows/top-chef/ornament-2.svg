<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-labelledby="orn2-title">
  <title id="orn2-title">Top Chef ornament — herb sprig.</title>
  <g stroke="#ECDFC6" stroke-linecap="round" fill="none">
