<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80" role="img" aria-labelledby="orn1-title">
  <title id="orn1-title">Top Chef ornament — paring knife.</title>
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- blade: tapered triangle pointing down-right -->
    <path d="M 14 16 L 60 56 L 56 60 L 10 18 Z" fill="#B86A2E" stroke="#ECDFC6" stroke-width="1.5"/>
    <!-- blade highlight -->
    <line x1="14" y1="18" x2="56" y2="56" stroke="#ECDFC6" stroke-width="0.8" opacity="0.55"/>
    <!-- handle -->
    <rect x="56" y="55" width="18" height="9" rx="2" transform="rotate(45 56 55)" fill="#ECDFC6" stroke="#ECDFC6" stroke-width="1"/>
    <!-- rivets -->
    <circle cx="64" cy="62" r="1.4" fill="#1B2418"/>
    <circle cx="70" cy="68" r="1.4" fill="#1B2418"/>
  </g>
</svg>
