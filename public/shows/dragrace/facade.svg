<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="facade-title">
  <title id="facade-title">Pantheon facade for RuPaul's Drag Race — scallop-pink crown pediment, jewel-strand frieze, spotlight-pole columns with a central jewel-strand</title>
  <rect width="1200" height="800" fill="#2D0B2A"/>

  <!-- PEDIMENT (0–200): gable + scallop-pink crown fan + radiating rays + jewel -->
  <g transform="translate(0 0)">
    <g stroke="#F2E1D2" stroke-width="6" fill="none" stroke-linejoin="round">
      <path d="M 30 196 L 600 24 L 1170 196 Z"/>
      <line x1="20" y1="196" x2="1180" y2="196"/>
      <line x1="14" y1="184" x2="1186" y2="184"/>
    </g>
    <!-- the scallop-pink crown fan filling the inner triangle -->
    <path d="M 230 192 Q 600 -40 970 192 Z" fill="#E64B86"/>
    <!-- radiating rays from the crown apex -->
    <g stroke="#F2E1D2" stroke-width="3" fill="none" opacity="0.85" stroke-linecap="round">
      <path d="M 600 192 L 600 30"/>
      <path d="M 600 192 Q 528 110 488 40"/>
      <path d="M 600 192 Q 672 110 712 40"/>
      <path d="M 600 192 Q 460 130 360 60"/>
      <path d="M 600 192 Q 740 130 840 60"/>
    </g>
    <!-- crown jewel at apex -->
    <circle cx="600" cy="92" r="14" fill="#F2E1D2"/>
    <circle cx="600" cy="92" r="6" fill="#E64B86"/>
  </g>

  <!-- FRIEZE (200–300): horizontal jewel-strand — alternating large/small circles -->
  <g transform="translate(0 220)">
    <g stroke="#F2E1D2" stroke-width="3" fill="none" stroke-linecap="round">
      <line x1="0" y1="6" x2="1200" y2="6"/>
      <line x1="0" y1="74" x2="1200" y2="74"/>
    </g>
    <g>
      <!-- 13 large + 12 small alternating beads centered on y=40 -->
      <g fill="#E64B86" stroke="#F2E1D2" stroke-width="2">
        <circle cx="48"   cy="40" r="11"/>
        <circle cx="144"  cy="40" r="11"/>
        <circle cx="240"  cy="40" r="11"/>
        <circle cx="336"  cy="40" r="11"/>
        <circle cx="432"  cy="40" r="11"/>
        <circle cx="528"  cy="40" r="11"/>
        <circle cx="624"  cy="40" r="11"/>
        <circle cx="720"  cy="40" r="11"/>
        <circle cx="816"  cy="40" r="11"/>
        <circle cx="912"  cy="40" r="11"/>
        <circle cx="1008" cy="40" r="11"/>
        <circle cx="1104" cy="40" r="11"/>
        <circle cx="1200" cy="40" r="11"/>
      </g>
      <g fill="none" stroke="#F2E1D2" stroke-width="2">
        <circle cx="96"   cy="40" r="6"/>
        <circle cx="192"  cy="40" r="6"/>
        <circle cx="288"  cy="40" r="6"/>
        <circle cx="384"  cy="40" r="6"/>
        <circle cx="480"  cy="40" r="6"/>
        <circle cx="576"  cy="40" r="6"/>
        <circle cx="672"  cy="40" r="6"/>
        <circle cx="768"  cy="40" r="6"/>
        <circle cx="864"  cy="40" r="6"/>
        <circle cx="960"  cy="40" r="6"/>
        <circle cx="1056" cy="40" r="6"/>
        <circle cx="1152" cy="40" r="6"/>
      </g>
      <line x1="0" y1="40" x2="1200" y2="40" stroke="#F2E1D2" stroke-width="1" opacity="0.35"/>
    </g>
  </g>

  <!-- COLUMNS (300–800): four spotlight-poles flanking a central jewel-strand -->
  <!-- spotlight-pole columns at x = 120, 360, 840, 1080 -->
  <g stroke="#F2E1D2" fill="none" stroke-linecap="round">
    <!-- pole 1 -->
    <g transform="translate(120 300)">
      <line x1="0" y1="60" x2="0" y2="460" stroke="#F2E1D2" stroke-width="3"/>
      <line x1="-12" y1="460" x2="12" y2="460" stroke="#F2E1D2" stroke-width="6"/>
      <circle cx="0" cy="50" r="14" fill="#E64B86" stroke="#F2E1D2" stroke-width="3"/>
      <g stroke="#F2E1D2" stroke-width="2" opacity="0.55">
        <path d="M 0 50 L -28 14"/>
        <path d="M 0 50 L 28 14"/>
        <path d="M 0 50 L -36 30"/>
        <path d="M 0 50 L 36 30"/>
      </g>
    </g>
    <!-- pole 2 -->
    <g transform="translate(360 300)">
      <line x1="0" y1="60" x2="0" y2="460" stroke="#F2E1D2" stroke-width="3"/>
      <line x1="-12" y1="460" x2="12" y2="460" stroke="#F2E1D2" stroke-width="6"/>
      <circle cx="0" cy="50" r="14" fill="#E64B86" stroke="#F2E1D2" stroke-width="3"/>
      <g stroke="#F2E1D2" stroke-width="2" opacity="0.55">
        <path d="M 0 50 L -28 14"/>
        <path d="M 0 50 L 28 14"/>
        <path d="M 0 50 L -36 30"/>
        <path d="M 0 50 L 36 30"/>
      </g>
    </g>
    <!-- pole 4 -->
    <g transform="translate(840 300)">
      <line x1="0" y1="60" x2="0" y2="460" stroke="#F2E1D2" stroke-width="3"/>
      <line x1="-12" y1="460" x2="12" y2="460" stroke="#F2E1D2" stroke-width="6"/>
      <circle cx="0" cy="50" r="14" fill="#E64B86" stroke="#F2E1D2" stroke-width="3"/>
      <g stroke="#F2E1D2" stroke-width="2" opacity="0.55">
        <path d="M 0 50 L -28 14"/>
        <path d="M 0 50 L 28 14"/>
        <path d="M 0 50 L -36 30"/>
        <path d="M 0 50 L 36 30"/>
      </g>
    </g>
    <!-- pole 5 -->
    <g transform="translate(1080 300)">
      <line x1="0" y1="60" x2="0" y2="460" stroke="#F2E1D2" stroke-width="3"/>
      <line x1="-12" y1="460" x2="12" y2="460" stroke="#F2E1D2" stroke-width="6"/>
      <circle cx="0" cy="50" r="14" fill="#E64B86" stroke="#F2E1D2" stroke-width="3"/>
      <g stroke="#F2E1D2" stroke-width="2" opacity="0.55">
        <path d="M 0 50 L -28 14"/>
        <path d="M 0 50 L 28 14"/>
        <path d="M 0 50 L -36 30"/>
        <path d="M 0 50 L 36 30"/>
      </g>
    </g>
  </g>

  <!-- CENTER COLUMN (x=600): the jewel-strand — alternating filled & outlined circles from y=140 to y=740 within this group -->
  <g transform="translate(600 300)">
    <!-- thin spine line behind beads -->
    <line x1="0" y1="0" x2="0" y2="460" stroke="#F2E1D2" stroke-width="1" opacity="0.4"/>
    <g stroke="#F2E1D2" stroke-width="4" fill="none">
      <circle cx="0" cy="20"  r="18" fill="#E64B86"/>
      <circle cx="0" cy="76"  r="14"/>
      <circle cx="0" cy="128" r="20" fill="#E64B86"/>
      <circle cx="0" cy="184" r="14"/>
      <circle cx="0" cy="236" r="22" fill="#E64B86"/>
      <circle cx="0" cy="296" r="14"/>
      <circle cx="0" cy="348" r="20" fill="#E64B86"/>
      <circle cx="0" cy="404" r="14"/>
      <circle cx="0" cy="448" r="12" fill="#E64B86"/>
    </g>
    <!-- center column plinth -->
    <line x1="-32" y1="468" x2="32" y2="468" stroke="#F2E1D2" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- ORNAMENT DISPERSAL: ground baseline + small crown silhouettes between columns -->
  <g stroke="#F2E1D2" stroke-width="3" fill="none">
    <line x1="0" y1="780" x2="1200" y2="780"/>
    <line x1="0" y1="772" x2="1200" y2="772" opacity="0.5"/>
  </g>
  <g fill="#E64B86" stroke="#F2E1D2" stroke-width="1.5" stroke-linejoin="round">
    <!-- crown silhouettes dispersed between columns -->
    <path d="M 232 770 L 236 758 L 242 766 L 248 754 L 254 766 L 260 758 L 264 770 Z"/>
    <path d="M 472 770 L 476 758 L 482 766 L 488 754 L 494 766 L 500 758 L 504 770 Z"/>
    <path d="M 696 770 L 700 758 L 706 766 L 712 754 L 718 766 L 724 758 L 728 770 Z"/>
    <path d="M 936 770 L 940 758 L 946 766 L 952 754 L 958 766 L 964 758 L 968 770 Z"/>
  </g>
  <g fill="#F2E1D2">
    <circle cx="40"   cy="766" r="2.5"/>
    <circle cx="1160" cy="766" r="2.5"/>
  </g>
</svg>
